<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luigi's Pizzaria - Internal System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1, h2 { color: #d32f2f; }
        section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { padding: 8px; margin-top: 5px; width: 100%; max-width: 300px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #45a049; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍕 Luigi's Pizzaria Management System</h1>

    <section id="order-section">
        <h2>Take Customer Order</h2>
        <label>Customer Name:</label>
        <input type="text" id="cust-name" placeholder="John Doe">

        <label>Select Item:</label>
        <select id="order-item" onchange="calculateLiveTotal()">
            </select>

        <label>Quantity:</label>
        <input type="number" id="order-qty" value="1" min="1" oninput="calculateLiveTotal()">

        <label>Server/Worker:</label>
        <select id="order-worker">
            </select>

        <p><strong>Total to Charge: </strong>$<span id="live-total">0.00</span></p>
        <button onclick="submitOrder()">Submit Order</button>
    </section>

    <section id="admin-menu-stock">
        <h2>Owner: Menu & Stock Settings</h2>
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div>
                <h3>Add Menu Item</h3>
                <input type="text" id="new-item-name" placeholder="Item Name (e.g., Pepperoni Pizza)">
                <input type="number" id="new-item-price" placeholder="Price ($)" step="0.01">
                <input type="number" id="new-item-stock" placeholder="Initial Stock Qty">
                <button onclick="addMenuItem()">Add/Update Item</button>
            </div>
        </div>

        <h3>Current Inventory & Prices</h3>
        <table>
            <thead>
                <tr><th>Item Name</th><th>Price</th><th>Stock Left</th></tr>
            </thead>
            <tbody id="stock-table-body">
                </tbody>
        </table>
    </section>

    <section id="admin-employees">
        <h2>Owner: Employee Ranks & Weekly Payouts</h2>
        <div>
            <h3>Add Employee</h3>
            <input type="text" id="emp-name" placeholder="Employee Name">
            <select id="emp-rank">
                <option value="Owner">Owner (50%)</option>
                <option value="Manager">Manager (45%)</option>
                <option value="Chef">Chef (40%)</option>
                <option value="Waiter">Waiter (35%)</option>
                <option value="Events Team">Events Team (35%)</option>
            </select>
            <button onclick="addEmployee()">Add Employee</button>
        </div>

        <h3>Weekly Payroll</h3>
        <table>
            <thead>
                <tr><th>Employee Name</th><th>Rank</th><th>Weekly Commission Earned</th></tr>
            </thead>
            <tbody id="payout-table-body">
                </tbody>
        </table>
    </section>
</div>

<script>
    // --- Initial Demo Data ---
    let menu = {
        "Cheese Pizza": { price: 12.00, stock: 50 },
        "Pepperoni Pizza": { price: 15.00, stock: 40 },
        "Soda": { price: 2.50, stock: 100 }
    };

    let employees = {
        "Luigi": { rank: "Owner", earnings: 0 },
        "Mario": { rank: "Chef", earnings: 0 },
        "Peach": { rank: "Waiter", earnings: 0 }
    };

    const rankRates = {
        "Owner": 0.50,
        "Manager": 0.45,
        "Chef": 0.40,
        "Waiter": 0.35,
        "Events Team": 0.35
    };

    // --- Core Functions ---

    function updateDropdowns() {
        // Update Items Dropdown
        const itemSelect = document.getElementById('order-item');
        itemSelect.innerHTML = '';
        for (let item in menu) {
            itemSelect.innerHTML += `<option value="${item}">${item} ($${menu[item].price.toFixed(2)})</option>`;
        }
        
        // Update Workers Dropdown
        const workerSelect = document.getElementById('order-worker');
        workerSelect.innerHTML = '';
        for (let emp in employees) {
            workerSelect.innerHTML += `<option value="${emp}">${emp} (${employees[emp].rank})</option>`;
        }
    }

    function renderTables() {
        // Render Stock Table
        const stockBody = document.getElementById('stock-table-body');
        stockBody.innerHTML = '';
        for (let item in menu) {
            stockBody.innerHTML += `<tr><td>${item}</td><td>$${menu[item].price.toFixed(2)}</td><td>${menu[item].stock}</td></tr>`;
        }

        // Render Payout Table
        const payoutBody = document.getElementById('payout-table-body');
        payoutBody.innerHTML = '';
        for (let emp in employees) {
            payoutBody.innerHTML += `<tr><td>${emp}</td><td>${employees[emp].rank}</td><td>$${employees[emp].earnings.toFixed(2)}</td></tr>`;
        }
    }

    function calculateLiveTotal() {
        const item = document.getElementById('order-item').value;
        const qty = parseInt(document.getElementById('order-qty').value) || 0;
        if(menu[item]) {
            document.getElementById('live-total').innerText = (menu[item].price * qty).toFixed(2);
        }
    }

    function submitOrder() {
        const custName = document.getElementById('cust-name').value;
        const item = document.getElementById('order-item').value;
        const qty = parseInt(document.getElementById('order-qty').value);
        const worker = document.getElementById('order-worker').value;

        if (!custName) { alert("Please enter a customer name."); return; }
        if (menu[item].stock < qty) { alert("Not enough stock left!"); return; }

        // Deduct Stock
        menu[item].stock -= qty;

        // Calculate Cost & Commission
        const totalCost = menu[item].price * qty;
        const rank = employees[worker].rank;
        const commissionRate = rankRates[rank];
        const cutEarned = totalCost * commissionRate;

        // Add to employee payout
        employees[worker].earnings += cutEarned;

        alert(`Order processed successfully!\nTotal Charged: $${totalCost.toFixed(2)}\n${worker} earned: $${cutEarned.toFixed(2)}`);
        
        // Refresh UI
        document.getElementById('cust-name').value = '';
        document.getElementById('order-qty').value = 1;
        calculateLiveTotal();
        renderTables();
    }

    function addMenuItem() {
        const name = document.getElementById('new-item-name').value;
        const price = parseFloat(document.getElementById('new-item-price').value);
        const stock = parseInt(document.getElementById('new-item-stock').value);

        if(!name || isNaN(price) || isNaN(stock)) { alert("Please fill in all menu fields correctly."); return; }

        menu[name] = { price: price, stock: stock };
        
        // Clear fields & Refresh
        document.getElementById('new-item-name').value = '';
        document.getElementById('new-item-price').value = '';
        document.getElementById('new-item-stock').value = '';
        updateDropdowns();
        renderTables();
    }

    function addEmployee() {
        const name = document.getElementById('emp-name').value;
        const rank = document.getElementById('emp-rank').value;

        if(!name) { alert("Please enter an employee name."); return; }

        employees[name] = { rank: rank, earnings: 0 };
        
        document.getElementById('emp-name').value = '';
        updateDropdowns();
        renderTables();
    }

    // Run setup on load
    updateDropdowns();
    renderTables();
    calculateLiveTotal();
</script>

</body>
</html>
